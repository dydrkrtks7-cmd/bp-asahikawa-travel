<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1157" cy="605" r="68" fill="#6d28d9" opacity="0.09"/>
    <circle cx="873" cy="485" r="89" fill="#6d28d9" opacity="0.11"/>
    <circle cx="981" cy="408" r="34" fill="#6d28d9" opacity="0.12"/>
    <circle cx="791" cy="382" r="34" fill="#6d28d9" opacity="0.07"/>
    <circle cx="137" cy="292" r="90" fill="#6d28d9" opacity="0.15"/>
    <circle cx="992" cy="203" r="43" fill="#6d28d9" opacity="0.11"/>
    <rect x="919" y="42" width="83" height="90" rx="8" fill="#7c3aed" opacity="0.04" transform="rotate(39, 641, -92)"/>
    <rect x="101" y="463" width="99" height="26" rx="8" fill="#7c3aed" opacity="0.05" transform="rotate(20, 1123, -4)"/>
    <rect x="67" y="296" width="25" height="23" rx="8" fill="#7c3aed" opacity="0.04" transform="rotate(30, 660, 559)"/>
    <rect x="770" y="155" width="76" height="93" rx="8" fill="#7c3aed" opacity="0.12" transform="rotate(31, 20, 360)"/>
    <rect x="261" y="712" width="52" height="66" rx="8" fill="#7c3aed" opacity="0.05" transform="rotate(21, 651, 88)"/>
    <rect x="-68" y="199" width="21" height="33" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(19, 978, 558)"/>
    <rect x="366" y="32" width="62" height="52" rx="8" fill="#7c3aed" opacity="0.05" transform="rotate(4, 10, 195)"/>
    <rect x="242" y="699" width="92" height="39" rx="8" fill="#7c3aed" opacity="0.10" transform="rotate(34, 662, 383)"/>
    <polygon points="91,326 154,452 28,452" fill="#6d28d9" opacity="0.08"/>
    <polygon points="1093,-148 1168,2 1018,2" fill="#6d28d9" opacity="0.08"/>
    <polygon points="559,474 623,602 495,602" fill="#6d28d9" opacity="0.05"/>
    <polygon points="617,-36 695,120 539,120" fill="#6d28d9" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,570 C360,600 840,540 1200,570 L1200,630 L0,630Z" fill="#6d28d9" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Asahikawa travel 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Asahikawa — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f472b6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f472b6" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Asahikawa Asahikawa travel 안내 — 정보
  </text>
</svg>